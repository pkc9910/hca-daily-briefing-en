name: HCA Daily Briefing

on:
  schedule:
    - cron: '45 6 * * 1-5'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.14'

      - name: Restore tickers cache
        uses: actions/cache@v4
        with:
          path: tickers_cache.json
          key: tickers-cache-${{ hashFiles('tickers_cache.json') }}
          restore-keys: |
            tickers-cache-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate and send briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          BRIEFING_RECIPIENTS: ${{ secrets.BRIEFING_RECIPIENTS }}
        run: python daily_briefing.py --email

      - name: Upload briefing artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: briefing-${{ github.run_id }}
          path: output/*.html
          retention-days: 90
          if-no-files-found: warn
